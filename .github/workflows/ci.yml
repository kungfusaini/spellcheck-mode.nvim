name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim: [v0.8.3, stable]
    name: Neovim ${{ matrix.neovim }}
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          version: ${{ matrix.neovim }}
          neovim: true
      - name: Run headless Neovim tests
        run: nvim --headless -u tests/minimal_init.lua -c "lua dofile('tests/run.lua')"
